<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Abdul Ahad — Founder & Managing Director of DosRicke Ventures. Building software products that Indian businesses depend on." />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Abdul Ahad — hrejuh" />
    <meta property="og:description" content="Founder & Managing Director of DosRicke Ventures Pvt Ltd. 18+ products shipped, 140,000+ lines of code, built for real businesses." />
    <meta property="og:image" content="/og-image.jpg" />
    <meta property="og:url" content="https://hrejuh.com" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Abdul Ahad — hrejuh" />
    <meta name="twitter:description" content="Founder & Managing Director of DosRicke Ventures Pvt Ltd." />
    <meta name="twitter:image" content="/og-image.jpg" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#92400E" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Fonts preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <title>Abdul Ahad — hrejuh</title>

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Abdul Ahad",
      "alternateName": "hrejuh",
      "jobTitle": "Founder & Managing Director",
      "worksFor": {
        "@type": "Organization",
        "name": "DosRicke Ventures Pvt Ltd",
        "url": "https://dosricke.com"
      },
      "url": "https://hrejuh.com",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Bangalore",
        "addressCountry": "IN"
      },
      "sameAs": [
        "https://github.com/hrejuh",
        "https://linkedin.com/in/hrejuh"
      ]
    }
    </script>

    <!-- Prevent FOULT -->
    <script>
      (function() {
        var s = localStorage.getItem("hrejuh-theme");
        var p = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", s || p);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
